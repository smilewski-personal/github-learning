name: Build MSI Installer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix

      - name: Build MSI
        run: |
          wix build installer/Product.wxs -o MyApp.msi

      - name: Copy MSI to installers folder
        run: |
          mkdir Applications\Installers -Force
          copy MyApp.msi Applications\Installers\MyApp.msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-installer
          path: MyApp.msi