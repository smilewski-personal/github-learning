name: Build MSI Installer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix

      - name: Build MSI
        run: |
          wix build installer/Product.wxs -o MyApp.msi

      - name: Copy MSI to installers folder
        run: |
          mkdir Applications\Installers -Force
          New-Item -ItemType Directory -Force -Path Applications/Installers
          Copy-Item -Path MyApp.msi -Destination Applications/Installers/MyApp.msi -Force

      - name: Commit and push MSI
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add Applications/Installers/MyApp.msi

          git commit -m "Add MSI installer [skip ci]" || echo "No changes to commit"

          git push

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-installer
          path: MyApp.msi